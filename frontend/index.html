<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Course Catalog – KAU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b14;
      --surface: #0d1424;
      --card: #111a2e;
      --border: #1e2f4d;
      --border-glow: #2563eb44;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --ok: #10b981;
      --warn: #f59e0b;
      --err: #ef4444;
      --grid-line: #0f1e36;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glowing orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: #1d4ed822; top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #0891b222; bottom: -50px; right: -50px; }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp .6s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e3a5f;
      border: 1px solid #2563eb55;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--accent2);
      letter-spacing: .5px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease infinite;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
    }

    /* ── Search Box ── */
    .search-wrap {
      animation: fadeUp .6s .1s ease both;
      margin-bottom: 36px;
    }

    .search-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 6px 6px 16px;
      transition: border-color .3s, box-shadow .3s;
    }
    .search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--border-glow);
    }

    .search-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 17px;
      font-family: 'Space Mono', monospace;
      outline: none;
      letter-spacing: 1px;
      text-align: left;
    }
    .search-row input::placeholder { color: var(--muted); font-family: 'Inter', sans-serif; font-size: 14px; letter-spacing: 0; }

    .btn-search {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-search:hover { background: #2563eb; }
    .btn-search:active { transform: scale(.97); }
    .btn-search:disabled { opacity: .5; cursor: not-allowed; }

    .examples {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .chip {
      background: #111a2e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Result cards ── */
    #result-section {
      animation: fadeUp .5s ease both;
      display: none;
    }
    #result-section.visible { display: block; }

    .course-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .course-code-badge {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent2);
      background: #0c2340;
      border: 1px solid #1e4d7b;
      border-radius: 8px;
      padding: 4px 12px;
    }
    .found-text {
      color: var(--muted);
      font-size: 13px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: border-color .3s, transform .2s;
      animation: cardIn .4s ease both;
    }
    .card:hover { border-color: #2563eb55; transform: translateY(-2px); }
    .card.full { grid-column: 1 / -1; }

    .card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .card-icon.blue { background: #1e3a5f; }
    .card-icon.cyan { background: #083344; }
    .card-icon.green { background: #052e16; }

    .card-title {
      font-size: 11px;
      letter-spacing: .8px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      font-family: 'Space Mono', monospace;
    }
    .card-value.text {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: #cbd5e1;
    }

    /* ── States ── */
    .state-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
    }
    .state-icon { font-size: 36px; margin-bottom: 12px; }
    .state-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .state-sub { font-size: 13px; }

    .err-box {
      background: #1c0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 14px;
      padding: 16px 20px;
      color: #fca5a5;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Loading ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ffffff33;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .1s; }
    .card:nth-child(3) { animation-delay: .15s; }

    @media (max-width: 540px) {
      .cards { grid-template-columns: 1fr; }
      .card.full { grid-column: auto; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      KAU · Course Catalog
    </div>
    <h1>Search Any Course</h1>
    <p class="subtitle">Enter a course code to instantly view credits, prerequisites, and description</p>
  </header>

  <div class="search-wrap">
    <span class="search-label">Course Code</span>
    <div class="search-row">
      <button id="goBtn" class="btn-search">Search</button>
      <input id="codeInput" type="text" placeholder="e.g. CPCS331" autocomplete="off" spellcheck="false" />
    </div>
    <div class="examples">
      <span class="chip" onclick="fillAndSearch('CPIT201')">CPIT201</span>
      <span class="chip" onclick="fillAndSearch('CPCS331')">CPCS331</span>
      <span class="chip" onclick="fillAndSearch('CPIT221')">CPIT221</span>
      <span class="chip" onclick="fillAndSearch('CPIT470')">CPIT470</span>
    </div>
  </div>

  <div id="result-section">
    <!-- filled by JS -->
  </div>

</div>

<script>
  const API = 'https://ask-major-api.onrender.com';
  const goBtn = document.getElementById('goBtn');
  const codeInput = document.getElementById('codeInput');
  const resultSection = document.getElementById('result-section');

  function setLoading(on) {
    if (on) {
      goBtn.disabled = true;
      goBtn.innerHTML = '<span class="spinner"></span>';
    } else {
      goBtn.disabled = false;
      goBtn.textContent = 'Search';
    }
  }

  function showEmpty() {
    resultSection.classList.add('visible');
    resultSection.innerHTML = `
      <div class="state-box">
        <div class="state-icon">🔍</div>
        <div class="state-title">No results found</div>
        <div class="state-sub">Check the course code and try again</div>
      </div>`;
  }

  function showError(msg) {
    resultSection.classList.add('visible');
    resultSection.innerHTML = `
      <div class="err-box">
        <span>⚠️</span>
        <span>Could not connect to the server. Please make sure the backend is running and try again.</span>
      </div>`;
  }

  function showResult(code, data) {
    const prereq = data.prerequisites || '—';
    const credits = data.Credits || '—';
    const desc    = data.description || '—';
    const isEmpty = prereq === '—' && credits === '—' && desc === '—';

    if (isEmpty) { showEmpty(); return; }

    resultSection.classList.add('visible');
    resultSection.innerHTML = `
      <div class="course-header">
        <span class="course-code-badge">${escHtml(code.toUpperCase())}</span>
        <span class="found-text">Course found</span>
      </div>
      <div class="cards">
        <div class="card">
          <div class="card-icon blue">⭐</div>
          <div class="card-title">Credits</div>
          <div class="card-value">${escHtml(credits)}</div>
        </div>
        <div class="card">
          <div class="card-icon cyan">🔗</div>
          <div class="card-title">Prerequisites</div>
          <div class="card-value">${escHtml(prereq)}</div>
        </div>
        <div class="card full">
          <div class="card-icon green">📄</div>
          <div class="card-title">Description</div>
          <div class="card-value text">${escHtml(desc)}</div>
        </div>
      </div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function search() {
    const code = codeInput.value.trim();
    if (!code) return;

    setLoading(true);
    resultSection.classList.remove('visible');
    resultSection.innerHTML = '';

    try {
      const r = await fetch(`${API}/api/course`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ course_code: code })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      showResult(code, data);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  function fillAndSearch(code) {
    codeInput.value = code;
    search();
  }

  goBtn.addEventListener('click', search);
  codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>
</body>
</html>
