<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask Major</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Search Any Course</h1>
    <p>Enter a course code to view details</p>

    <div class="search-box">
      <input id="courseInput" type="text" placeholder="e.g. CPCS331" />
      <button id="searchBtn">Search</button>
    </div>

    <div id="errorBox" class="error" hidden></div>

    <div id="resultBox" class="result" hidden>
      <div class="card">
        <h3>Credits</h3>
        <p id="credits"></p>
      </div>

      <div class="card">
        <h3>Prerequisites</h3>
        <p id="prereq"></p>
      </div>

      <div class="card">
        <h3>Description</h3>
        <p id="desc"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
