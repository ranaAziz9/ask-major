<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask Major</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">

    <!-- Header -->
    <header>
      <h1>Search Any Course</h1>
      <p>Enter a course code to view credits, prerequisites, and description</p>
    </header>

    <!-- Search Box -->
    <div class="search-box">
      <input
        id="courseInput"
        type="text"
        placeholder="e.g. CPCS331"
      />
      <button id="searchBtn">Search</button>
    </div>

    <!-- Quick Buttons -->
    <div class="quick-buttons">
      <button onclick="fillAndSearch('CPCS211')">CPCS211</button>
      <button onclick="fillAndSearch('CPCS331')">CPCS331</button>
      <button onclick="fillAndSearch('CPCS204')">CPCS204</button>
      <button onclick="fillAndSearch('CPIT221')">CPIT221</button>
    </div>

    <!-- Error -->
    <div id="errorBox" class="error-box" hidden></div>

    <!-- Result -->
    <div id="resultBox" class="result-box" hidden>

      <div class="card">
        <h3>Credits</h3>
        <p id="credits">—</p>
      </div>

      <div class="card">
        <h3>Prerequisites</h3>
        <p id="prereq">—</p>
      </div>

      <div class="card">
        <h3>Description</h3>
        <p id="desc">—</p>
      </div>

    </div>

  </div>

  <!-- IMPORTANT: Only this script -->
  <script src="script.js"></script>

</body>
</html>
